<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>שופט שורות — Judo Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0e;--surface:#111318;--border:#1e2130;
  --blue:#0033aa;--wbg:#f0f0f0;
  --acc:#e8c84a;--red:#ff3030;--grn:#00cc44;
  --txt:#f0f0f0;--txt2:#8a8fa0;--txt3:#3a3f50;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Heebo',sans-serif;touch-action:manipulation;display:flex;flex-direction:column;}

/* ── CTRL BAR ── */
#ctrl-bar{flex-shrink:0;background:rgba(10,10,14,.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;padding:5px 10px;flex-wrap:wrap;z-index:50;}
.ctrl-btn{padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:rgba(10,10,14,.9);color:#4a4f60;font-family:'Heebo',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;}
.ctrl-btn:hover{color:#f0f0f0;border-color:#4a4f60;}
.ctrl-btn.on{background:rgba(155,89,182,.2);color:#9b59b6;border-color:#9b59b6;}

/* ── APP ── */
#app{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative;}
:fullscreen #app{height:100vh;width:100vw;}
:-webkit-full-screen #app{height:100vh;width:100vw;}
body.fullscreen #ctrl-bar{display:none!important;visibility:hidden;}
:fullscreen #ctrl-bar{display:none!important;visibility:hidden;}
:-webkit-full-screen #ctrl-bar{display:none!important;visibility:hidden;}

/* ── BANNER ── */
#banner{flex-shrink:0;background:#111318;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 16px;min-height:44px;}
#banner-text{font-size:13px;font-weight:600;color:#8a8fa0;text-align:center;}

/* ── ROWS LAYOUT ── */
#rows-area{flex:1;display:flex;flex-direction:column;min-height:0;}
.row-half{flex:1;min-height:0;}

/* row halves */

/* ── HALF ROW: compact horizontal layout like screenshot ── */
.row-half{display:flex;align-items:center;padding:0 16px;gap:14px;flex:1;cursor:default;}
.row-half.blue{background:#0d1d42;}
.row-half.white{background:#e8e8e8;}



/* IWY pills — small boxes with label on top */
.iwy-pills{display:flex;gap:6px;align-items:center;}
.iwy-pill{display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none;transition:opacity .1s;}
.iwy-pill:active{opacity:.6;}
.iwy-pill-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.4);margin-bottom:2px;}
.white .iwy-pill-lbl{color:rgba(0,0,0,.35);}
.iwy-pill-val{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,52px);line-height:1;
  background:rgba(255,255,255,.1);border-radius:6px;
  width:clamp(44px,10vw,70px);text-align:center;color:rgba(255,255,255,.6);
  transition:all .15s;
}
.white .iwy-pill-val{background:rgba(0,0,0,.1);color:rgba(0,0,0,.4);}
.iwy-pill-val.has-score{color:#fff;background:rgba(255,255,255,.2);}
.white .iwy-pill-val.has-score{color:#111;background:rgba(0,0,0,.15);}

/* Shido dots */
.shido-dots{display:flex;gap:5px;align-items:center;}
.r-nameblock{flex:1;text-align:right;display:flex;flex-direction:column;justify-content:center;padding-right:4px;}
.r-name{font-size:clamp(15px,3.5vw,22px);font-weight:700;}
.blue .r-name{color:#fff;}
.white .r-name{color:#111;}
.r-club{font-size:10px;margin-top:1px;}
.blue .r-club{color:rgba(255,255,255,.45);}
.white .r-club{color:#888;}
.shido-dot{width:14px;height:14px;border-radius:3px;border:2px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;transition:all .15s;}
.white .shido-dot{border-color:rgba(0,0,0,.2);}
.shido-dot.on{background:var(--red);border-color:var(--red);}

/* ── TIMER BAR ── */
#timer-bar{flex-shrink:0;background:#111318;border-top:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 0;}
#main-clock{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,14vw,110px);letter-spacing:4px;color:var(--red);line-height:1;cursor:pointer;user-select:none;transition:color .3s;}
#main-clock.running{color:var(--grn);}
#main-clock.golden{color:var(--acc);animation:gpulse 1s infinite;}
#clock-sub{font-size:9px;color:var(--txt3);letter-spacing:1.5px;margin-top:-4px;}
@keyframes gpulse{0%,100%{opacity:1;}50%{opacity:.4;}}
#osae-row{display:flex;align-items:center;gap:12px;}
.assign-sq{width:22px;height:22px;border-radius:4px;cursor:pointer;transition:all .15s;border:2px solid;}
.assign-sq.sq-blue{background:#0a1628;border-color:var(--blue);}
.assign-sq.sq-blue.sel{background:var(--blue);border-color:#7ab0ff;box-shadow:0 0 8px rgba(0,51,170,.5);}
.assign-sq.sq-white{background:#d0d0d0;border-color:#e0e0e0;}
.assign-sq.sq-white.sel{background:#fff;border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.4);}
#osae-block{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
#osae-clock{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,48px);letter-spacing:2px;line-height:1;color:var(--txt3);user-select:none;transition:color .2s;}
#osae-clock.active{color:var(--acc);animation:gpulse .8s infinite;}
#osae-lbl{font-size:8px;color:var(--txt3);letter-spacing:1.5px;}

/* ── WINNER OVERLAY ── */
#winner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#winner-overlay.show{display:flex;}
#win-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,10vw,80px);letter-spacing:3px;}
#win-reason{font-size:14px;color:var(--txt2);}
.ov-btn{padding:10px 28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--txt);font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}

/* offline badge */
#offline-fullscreen-badge{display:none;position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(155,89,182,.25);border:1px solid #9b59b6;border-radius:6px;padding:3px 14px;font-size:11px;font-weight:700;color:#b07fda;z-index:60;pointer-events:none;white-space:nowrap;}
body.fullscreen #offline-fullscreen-badge.show{display:flex;}

/* modals */
.side-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.side-ov.h{display:none;}
.side-md{background:#111318;border:1px solid #1e2130;border-radius:10px;width:100%;max-width:380px;}
.side-mh{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.side-mt{font-size:14px;font-weight:700;}
.side-mb{padding:0 16px 16px;}
.side-mf{padding:10px 16px;border-top:1px solid #1e2130;display:flex;justify-content:flex-end;gap:8px;}
.side-fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.side-fg label{font-size:10px;font-weight:700;color:#8a8fa0;text-transform:uppercase;letter-spacing:.4px;}
.side-fc{background:#0a0b0f;border:1px solid #1e2130;border-radius:5px;padding:8px 10px;color:#f0f0f0;font-family:'Heebo',sans-serif;font-size:13px;outline:none;width:100%;}
.side-fc:focus{border-color:#e8c84a;}
.side-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.side-btn-p{background:#e8c84a;color:#000;}
.side-btn-s{background:#191c24;color:#f0f0f0;border:1px solid #1e2130;}
</style>
<script src="db.js"></script>
</head>

<script>
// ══════ IDENTICAL LOGIC TO referee-sides.html ══════
const SC={blue:{I:0,W:0,Y:0,S:0},white:{I:0,W:0,Y:0,S:0}};
const SHIDO={blue:[false,false,false],white:[false,false,false]};
const hist=[];
let status='idle',timeLeft=180,osaeTime=0,osaeActive=false,osaeSide=null;
let mainInterval=null,osaeInterval=null,matchDuration=180;
let isOffline=false,mirrored=false,sidesSwapped=false;
let pendingOsaeTime=0,pendingOsaeTimeout=null;

function add(side,key){
  if(status==='done')return;
  hist.push({side,snap:{...SC[side]},shidoSnap:[...SHIDO[side]]});
  if(key==='W'){
    if(SC[side].W>=1){SC[side].W=0;SC[side].I=1;}
    else SC[side].W=1;
  }else if(key==='I'){SC[side].I=1;}
  else if(key==='Y'){SC[side].Y=Math.min(9,SC[side].Y+1);}
  syncScore();checkWin();
}

function toggleShido(side,idx){
  if(status==='done')return;
  hist.push({side,snap:{...SC[side]},shidoSnap:[...SHIDO[side]]});
  SHIDO[side][idx]=!SHIDO[side][idx];
  SC[side].S=SHIDO[side].filter(Boolean).length;
  syncShido(side);checkWin();
}

function undoLast(){
  if(!hist.length)return;
  const e=hist.pop();
  SC[e.side]={...e.snap};
  SHIDO[e.side]=[...e.shidoSnap];
  syncScore();syncShido(e.side);
}

function checkWin(){
  const b=SC.blue,w=SC.white;
  if(b.I>=1){declareWinner('blue','Ippon');return;}
  if(w.I>=1){declareWinner('white','Ippon');return;}
  if(b.W>=2){SC.blue.W=0;SC.blue.I=1;syncScore();declareWinner('blue','Waza-ari × 2');return;}
  if(w.W>=2){SC.white.W=0;SC.white.I=1;syncScore();declareWinner('white','Waza-ari × 2');return;}
  if(b.S>=3){declareWinner('white','Hansoku-make');return;}
  if(w.S>=3){declareWinner('blue','Hansoku-make');return;}
}

async function declareWinner(side,reason){ if(reason==='Ippon'||reason==='Waza-ari × 2') playSound('ippon');
  pauseMain();stopOsaeInterval();status='done';
  const bName=document.getElementById('r-bname').textContent;
  const wName=document.getElementById('r-wname').textContent;
  const winnerName=side==='blue'?bName:wName;
  const loserName=side==='blue'?wName:bName;
  const wn=document.getElementById('win-name');
  wn.textContent=winnerName;
  wn.style.color=side==='blue'?'#4a90ff':'#d0d0d0';
  document.getElementById('win-reason').textContent=reason;
  document.getElementById('winner-overlay').classList.add('show');
  syncClockSub();

  // Save result to Supabase
  const p=new URLSearchParams(location.search);
  const matchId=p.get('matchid');
  const tatamiId=p.get('tatami');
  if(matchId&&typeof DB!=='undefined'){
    try{
      // Determine winner_id from side and URL params
      const _winnerId = side==='blue' ? p.get('blueid') : p.get('whiteid');
      const _loserId  = side==='blue' ? p.get('whiteid') : p.get('blueid');
      await DB.updateMatch(matchId,{
        status:'done',
        winner_id: _winnerId||null,
        win_reason:reason,
        score:SC,
        is_offline:isOffline,
        ended_at: new Date().toISOString(),
      });
      // Propagate winner/loser to next matches
      const bNameEl = document.getElementById('r-bname')||document.getElementById('blue-name');
      const wNameEl = document.getElementById('r-wname')||document.getElementById('white-name');
      // Get competitor IDs from URL params (set when match loaded)
      // Use same winner/loser IDs as saved above
      if(_winnerId||_loserId){
        await propagateWinner(matchId, _winnerId, _loserId);
      }
    }catch(e){console.error('save result:',e);}
  }

  // Add "קרב הבא" button to overlay
  const ovBtns=document.querySelector('#winner-overlay div[style*="gap"]')||document.querySelector('#winner-overlay .ov-btns');
  if(ovBtns&&tatamiId){
    const nextBtn=document.createElement('button');
    nextBtn.className='ov-btn';
    nextBtn.textContent='⏭ קרב הבא';
    nextBtn.style.cssText='background:var(--acc,#e8c84a);color:#000;font-weight:700;';
    const _currentMatchId=matchId;
    nextBtn.onclick=()=>loadNextMatch(tatamiId, _currentMatchId);
    ovBtns.appendChild(nextBtn);
  }
}

async function loadNextMatch(tatamiId, skipMatchId=null){
  try{
    const compId=localStorage.getItem('judo_active_comp');
    if(!compId){ showToast('⚠ אין תחרות פעילה'); return; }
    
    const cats=await DB.getCategories(compId);
    const tatamiCats=(cats||[]).filter(c=>Number(c.tatami_id)===Number(tatamiId));
    if(!tatamiCats.length){ showToast('✓ כל הקרבות הסתיימו!'); return; }

    // For a category, get its next "block" of matches to run
    // League: always 1 match at a time
    // Knockout: all matches of the current stage together
    //   - First round (no done matches yet): only W matches (no consolation)
    //   - Later rounds: W + R matches of current stage
    function getNextBlock(cat){
      const allMatches = cat.matches||[];
      const isLeague = cat.method==='league';
      
      if(isLeague){
        // League: one pending match at a time
        const next = allMatches
          .filter(m=>m.status==='pending'&&m.blue_id&&m.white_id&&m.win_reason!=='bye'&&m.id!==skipMatchId)
          .sort((a,b)=>(a.order_in_tatami||a.match_num||99)-(b.order_in_tatami||b.match_num||99));
        return next.length ? [next[0]] : [];
      }
      
      // Knockout: find current stage
      const hasDone = allMatches.some(m=>m.status==='done'&&m.win_reason!=='bye');
      const pending = allMatches
        .filter(m=>m.status==='pending'&&m.blue_id&&m.white_id&&m.win_reason!=='bye'&&m.id!==skipMatchId)
        .sort((a,b)=>(a.order_in_tatami||a.match_num||99)-(b.order_in_tatami||b.match_num||99));
      
      if(!pending.length) return [];
      
      // First round: only winners bracket (stage_type=W or F)
      // Later rounds: include consolation (stage_type=R) too
      const eligible = hasDone 
        ? pending  // all pending including consolation
        : pending.filter(m=>m.stage_type==='W'||m.stage_type==='F');
      
      if(!eligible.length) return [];
      
      // Get the current stage (earliest stage among eligible)
      const currentStage = eligible[0].stage;
      // Return ALL matches of this stage
      return eligible.filter(m=>m.stage===currentStage);
    }

    // Find current category index
    let currentCatIdx=-1;
    if(skipMatchId){
      for(let i=0;i<tatamiCats.length;i++){
        if((tatamiCats[i].matches||[]).find(m=>m.id===skipMatchId)){
          currentCatIdx=i; break;
        }
      }
    }

    // Find current block index within current category
    // (which match in the block was skipMatchId?)
    let currentBlockIdx=-1;
    if(currentCatIdx>=0 && skipMatchId){
      const block=getNextBlock(tatamiCats[currentCatIdx]);
      // skipMatchId was the last done match - check if there are more in same block
      // Actually: getNextBlock already excludes skipMatchId, so if block has matches
      // AND they're same stage as skip → continue in same cat
      const skipMatch=(tatamiCats[currentCatIdx].matches||[]).find(m=>m.id===skipMatchId);
      const isCurrentLeague = tatamiCats[currentCatIdx].method==='league';
      if(skipMatch && !isCurrentLeague){
        // For knockout: stay in same stage if more matches remain
        const sameStageRemaining=block.filter(m=>m.stage===skipMatch.stage);
        if(sameStageRemaining.length){
          currentBlockIdx=0; // pick next match in same stage
        }
      }
      // League: always move to next category (currentBlockIdx stays -1)
    }

    let next=null, nextCat=null;

    if(currentBlockIdx===0 && currentCatIdx>=0){
      // Continue in same category (same stage, more matches)
      const block=getNextBlock(tatamiCats[currentCatIdx]);
      if(block.length){ next=block[0]; nextCat=tatamiCats[currentCatIdx]; }
    }

    if(!next){
      // Move to next category (round-robin)
      const startIdx = currentCatIdx>=0 ? currentCatIdx+1 : 0;
      for(let i=0;i<tatamiCats.length;i++){
        const idx=(startIdx+i)%tatamiCats.length;
        const block=getNextBlock(tatamiCats[idx]);
        if(block.length){ next=block[0]; nextCat=tatamiCats[idx]; break; }
      }
    }

    if(next&&nextCat){
      const comps=nextCat.competitors||[];
      const blue=comps.find(c=>c.id===next.blue_id);
      const white=comps.find(c=>c.id===next.white_id);
      await DB.updateMatch(next.id,{status:'live', started_at: new Date().toISOString()});
      const target=location.pathname.includes('sides')?'referee-sides.html':'referee-rows.html';
      const params=new URLSearchParams({
        tatami:tatamiId, matchid:next.id,
        blueid:next.blue_id||'', whiteid:next.white_id||'',
        blue:blue?.name||'', white:white?.name||'',
        bclub:blue?.club||'', wclub:white?.club||'',
        stage:nextCat.name+(next.stage?' · '+next.stage:''),
        banner:'מזרן '+tatamiId+' · '+nextCat.name,
      });
      location.href=target+'?'+params.toString();
    }else{
      showToast('✓ כל הקרבות במזרן הסתיימו!');
    }
  }catch(e){
    console.error('loadNextMatch:',e);
    showToast('⚠ שגיאה: '+e.message);
  }
}

function toggleTimer(){
  if(status==='done')return;
  if(status==='idle'||status==='paused'){
    if(timeLeft===0){
      // Start golden score
      status='golden';
      syncMainClock();syncClockSub();
      startMain();
    } else {
      status='live';
      startMain();
    }
  }else{pauseMain();status='paused';}
  syncClockSub();
}

function startMain(){
  if(mainInterval)clearInterval(mainInterval);
  mainInterval=setInterval(()=>{
    if(status==='golden')timeLeft++;
    else{timeLeft--;if(timeLeft<=0){timeLeft=0;clearInterval(mainInterval);mainInterval=null;syncMainClock();stopOsaeInterval();checkTimeEnd();return;}}
    syncMainClock();
  },1000);
}

function pauseMain(){if(mainInterval){clearInterval(mainInterval);mainInterval=null;}stopOsaeInterval();}

function checkTimeEnd(){ playSound('timeup');
  const b=SC.blue,w=SC.white;
  let win=null;
  if(b.W!==w.W)win=b.W>w.W?'blue':'white';
  else if(b.Y!==w.Y)win=b.Y>w.Y?'blue':'white';
  if(win){declareWinner(win,'Time');return;}
  // Tie: stop at 0:00, wait for referee to tap clock for golden score
  status='paused';
  timeLeft=0;
  syncMainClock();
  document.getElementById('clock-sub')||document.getElementById('r-status-lbl');
  // Show GS prompt on sub label
  ['clock-sub','r-status-lbl','s-status-lbl'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent='⚡ לחץ להתחלת גולדן סקור';
  });
  showToast('⏱ לחץ על השעון להתחיל גולדן סקור');
}

function toggleOsae(){
  if(status!=='live'&&status!=='golden')return;
  osaeActive?stopOsae():startOsae();
}

function startOsae(){
  osaeActive=true;pauseMain();
  if(osaeInterval)clearInterval(osaeInterval);
  osaeInterval=setInterval(()=>{
    osaeTime++;
    if(osaeSide&&getOsaeKey(osaeTime,osaeSide)==='I'&&osaeTime>=10){
      stopOsaeInterval();osaeActive=false;
      add(osaeSide,'I');osaeTime=0;syncOsaeClock();
      if(status==='live'||status==='golden')startMain();return;
    }
    syncOsaeClock();
  },1000);
  syncOsaeClock();
}

function stopOsaeInterval(){if(osaeInterval){clearInterval(osaeInterval);osaeInterval=null;}}

function getOsaeKey(s,side){
  if(s>=10&&SC[side].W>=1)return'I';
  if(s>=20)return'I';if(s>=10)return'W';if(s>=5)return'Y';return null;
}

function stopOsae(){
  stopOsaeInterval();osaeActive=false;
  if(osaeTime>=5&&osaeSide){const k=getOsaeKey(osaeTime,osaeSide);if(k)add(osaeSide,k);}
  else if(osaeTime>=5&&!osaeSide){
    pendingOsaeTime=osaeTime;osaeTime=0;startPendingBlink();return;
  }
  osaeTime=0;syncOsaeClock();
  if(status==='live'||status==='golden')startMain();
}

function startPendingBlink(){
  document.getElementById('osae-clock').classList.add('pending-blink');
  document.getElementById('osae-clock').textContent=String(pendingOsaeTime).padStart(2,'0');
  if(pendingOsaeTimeout)clearTimeout(pendingOsaeTimeout);
  pendingOsaeTimeout=setTimeout(()=>{cancelPending();if(status==='live'||status==='golden')startMain();},10000);
}

function cancelPending(){
  if(pendingOsaeTimeout){clearTimeout(pendingOsaeTimeout);pendingOsaeTimeout=null;}
  document.getElementById('osae-clock').classList.remove('pending-blink');
  pendingOsaeTime=0;syncOsaeClock();
}

function assignOsae(side){
  if(pendingOsaeTime>0){
    osaeSide=side;
    const t=pendingOsaeTime;cancelPending();
    const k=getOsaeKey(t,side);if(k)add(side,k);
    if(status==='live'||status==='golden')startMain();
  } else {
    osaeSide=osaeSide===side?null:side;
  }
  document.getElementById('sq-blue').classList.toggle('sel',osaeSide==='blue');
  document.getElementById('sq-white').classList.toggle('sel',osaeSide==='white');
}

function resetMatch(){
  pauseMain();stopOsaeInterval();cancelPending();
  SC.blue={I:0,W:0,Y:0,S:0};SC.white={I:0,W:0,Y:0,S:0};
  SHIDO.blue=[false,false,false];SHIDO.white=[false,false,false];
  hist.length=0;timeLeft=matchDuration;osaeTime=0;osaeActive=false;osaeSide=null;
  status='idle';
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('sq-blue').classList.remove('sel');
  document.getElementById('sq-white').classList.remove('sel');
  syncScore();syncShido('blue');syncShido('white');syncMainClock();syncClockSub();syncOsaeClock();
}

function syncScore(){
  ['I','W','Y'].forEach(k=>{
    ['b','w'].forEach(s=>{
      const side=s==='b'?'blue':'white';
      const el=document.getElementById('r-'+s+k);
      if(!el)return;
      el.textContent=SC[side][k];
      el.classList.toggle('has-score',SC[side][k]>0);
      // also update parent pill style
      if(el.parentElement) el.parentElement.classList.toggle('has-score',SC[side][k]>0);
    });
  });
}

function syncShido(side){
  const p=side==='blue'?'b':'w';
  const row=document.getElementById('r-'+p+'-shido');
  if(!row)return;
  row.querySelectorAll('.shido-dot,.shido-sq').forEach((sq,i)=>sq.classList.toggle('on',SHIDO[side][i]));
}

function syncMainClock(){
  const el=document.getElementById('main-clock');
  const gs=status==='golden';
  const mm=Math.floor(timeLeft/60),ss=String(timeLeft%60).padStart(2,'0');
  el.textContent=gs?`GS ${mm}:${ss}`:`${mm}:${ss}`;
  el.classList.toggle('golden',gs);
  el.classList.toggle('running',status==='live'&&!gs);
}

function syncClockSub(){
  const m={idle:'לחץ להתחלה',live:'',paused:'מושהה',golden:'⚡ גולדן סקור',done:'הסתיים'};
  document.getElementById('clock-sub').textContent=m[status]||'';}

function syncOsaeClock(){
  const el=document.getElementById('osae-clock');
  el.textContent=String(osaeTime).padStart(2,'0');
  el.classList.toggle('active',osaeActive);
}

function swapSides(){
  sidesSwapped = !sidesSwapped;
  const btn = document.getElementById('swap-btn');
  btn.classList.toggle('on', sidesSwapped);

  // Swap the display names only — not the scoring arrays
  const bNameEl = document.getElementById('r-bname') || document.getElementById('blue-name');
  const wNameEl = document.getElementById('r-wname') || document.getElementById('white-name');
  const bClubEl = document.getElementById('r-bclub') || document.getElementById('blue-meta');
  const wClubEl = document.getElementById('r-wclub') || document.getElementById('white-meta');

  if(bNameEl && wNameEl){
    const tmpName = bNameEl.textContent;
    bNameEl.textContent = wNameEl.textContent;
    wNameEl.textContent = tmpName;
  }
  if(bClubEl && wClubEl){
    const tmpClub = bClubEl.textContent;
    bClubEl.textContent = wClubEl.textContent;
    wClubEl.textContent = tmpClub;
  }

  showToast(sidesSwapped ? '⇅ צדדים הוחלפו' : '⇅ צדדים חזרו');
}

function openDelay(){document.getElementById('delay-ov').classList.remove('h');}
async function confirmDelay(){
  document.getElementById('delay-ov').classList.add('h');
  const p=new URLSearchParams(location.search);
  const matchId=p.get('matchid');
  const tatamiId=p.get('tatami');
  if(!matchId||typeof DB==='undefined'){ showToast('⏭ קרב נדחה'); return; }
  try{
    // Get current match order
    const rows=await supaFetch('matches?id=eq.'+matchId+'&select=order_in_tatami,category_id');
    const curOrder=(rows&&rows[0])?rows[0].order_in_tatami||999:999;
    
    // Collect all pending matches in this tatami, sorted by order
    const compId=localStorage.getItem('judo_active_comp');
    const cats=await DB.getCategories(compId);
    const tatamiCats=(cats||[]).filter(c=>Number(c.tatami_id)===Number(tatamiId));
    const allPending=[];
    tatamiCats.forEach(cat=>{
      (cat.matches||[])
        .filter(m=>m.status==='pending'&&m.blue_id&&m.white_id&&m.win_reason!=='bye'&&m.id!==matchId)
        .forEach(m=>allPending.push(m));
    });
    allPending.sort((a,b)=>(a.order_in_tatami||99)-(b.order_in_tatami||99));
    
    // Place after 3rd pending match
    const target=allPending[2];
    let newOrder;
    if(target){
      const after=allPending[3];
      newOrder=after?Math.round((target.order_in_tatami+after.order_in_tatami)/2):target.order_in_tatami+1;
    } else {
      newOrder=(allPending[allPending.length-1]?.order_in_tatami||curOrder)+1;
    }
    
    await DB.updateMatch(matchId,{status:'pending', order_in_tatami:Math.round(newOrder)});
    showToast('⏭ קרב נדחה ב-3 קרבות');
    if(tatamiId) await loadNextMatch(tatamiId, matchId);
  }catch(e){
    console.error('delay:',e);
    showToast('⚠ שגיאה');
  }
}

function openChangeDuration(){document.getElementById('dur-val').value=matchDuration;document.getElementById('dur-ov').classList.remove('h');}
function confirmDuration(){
  const d=+document.getElementById('dur-val').value;
  if(d<30||d>600){alert('זמן לא תקין');return;}
  matchDuration=d;if(status==='idle')timeLeft=d;
  document.getElementById('dur-ov').classList.add('h');
  syncMainClock();showToast(`⏱ זמן שונה ל-${Math.floor(d/60)}:${String(d%60).padStart(2,'0')}`);
}

function enterFullscreen(){
  const appEl=document.getElementById('app');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const req=appEl.requestFullscreen||appEl.webkitRequestFullscreen;
    if(req)req.call(appEl).catch(()=>{});
    document.body.classList.add('fullscreen');
  }else{
    const ex=document.exitFullscreen||document.webkitExitFullscreen;
    if(ex)ex.call(document).catch(()=>{});
    document.body.classList.remove('fullscreen');
  }
}

// After match done — propagate winner/loser to next matches
// Also auto-processes BYE if next match has only one player
async function propagateWinner(matchId, winnerId, loserId){
  if(!matchId) return;
  try{
    const rows=await supaFetch(`matches?id=eq.${matchId}&select=w_to_match,w_to_side,l_to_match,l_to_side,category_id,stage`);
    const m=rows?.[0];
    if(!m) return;
    const catId=m.category_id;
    const currentStage=m.stage||'';

    // Propagate winner to next match
    if(m.w_to_match&&winnerId){
      const field=m.w_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.w_to_match}`,'PATCH',{[field]:winnerId});
      // Check if next match is now a BYE (has one player, other is null)
      await autoProcessBye(catId, m.w_to_match);
    }
    // Propagate loser to consolation
    if(m.l_to_match&&loserId){
      const lField=m.l_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.l_to_match}`,'PATCH',{[lField]:loserId});
    }
    
    // After propagation: check if ALL matches in current W stage are done
    // Only then process BYEs in consolation
    try{
      // Get current match's stage to know which W stage just finished
      const stageMatches=await supaFetch(`matches?category_id=eq.${catId}&stage=eq.${encodeURIComponent(currentStage)}&stage_type=eq.W&select=id,status`);
      const allStageDone=stageMatches&&stageMatches.length>0&&stageMatches.every(sm=>sm.status==='done'||sm.status==='bye');
      if(allStageDone){
        // Get all consolation matches with exactly one player - process each as BYE
        const consolationMatches=await supaFetch(`matches?category_id=eq.${catId}&stage_type=eq.R&status=eq.pending&select=id,blue_id,white_id,match_num`);
        if(consolationMatches){
          for(const cm of consolationMatches){
            const hasOne=(cm.blue_id&&!cm.white_id)||(!cm.blue_id&&cm.white_id);
            if(hasOne) await checkAndProcessBye(catId, cm.match_num);
          }
        }
      }
    }catch(e){console.warn('bye check:',e);}
  }catch(e){console.error('propagate:',e);}
}

// Check if a consolation match has only one player and auto-process as BYE
async function checkAndProcessBye(catId, matchNum){
  try{
    const rows=await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${matchNum}&select=id,blue_id,white_id,status,stage_type,w_to_match,w_to_side,l_to_match,l_to_side,win_reason`);
    const m=rows?.[0];
    if(!m) return;
    // Only process: not yet done, consolation match (R), exactly ONE player
    if(m.status==='done'||m.status==='bye') return;
    if(m.blue_id&&m.white_id) return; // both players = real match
    if(!m.blue_id&&!m.white_id) return; // no players yet = wait
    if(m.stage_type!=='R') return; // only consolation matches
    
    const winner=m.blue_id||m.white_id;
    // Mark as bye
    await supaFetch(`matches?id=eq.${m.id}`,'PATCH',{
      status:'bye', winner_id:winner, win_reason:'bye'
    });
    // Place winner in next match (no recursion - wait for real opponent)
    if(m.w_to_match&&winner){
      const field=m.w_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.w_to_match}`,'PATCH',{[field]:winner});
    }
  }catch(e){console.warn('checkAndProcessBye:',e);}
}

// Auto-process a match as BYE ONLY if it has exactly one player AND the other slot is NULL
// This means the match was originally a bye (odd-number bracket), not a future match
async function autoProcessBye(catId, matchNum){
  try{
    const rows=await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${matchNum}&select=id,blue_id,white_id,status,stage_type,w_to_match,w_to_side,win_reason`);
    const m=rows?.[0];
    if(!m) return;
    if(m.status==='done'||m.status==='bye'||m.win_reason==='bye') return;
    // Both players present = normal match, never auto-bye
    if(m.blue_id&&m.white_id) return;
    // No players at all = future match not yet filled, skip
    if(!m.blue_id&&!m.white_id) return;
    // Exactly one player AND this is a consolation/rep match (stage_type=R)
    // Only auto-bye consolation matches, never winners bracket
    if(m.stage_type!=='R') return;
    const byeWinner=m.blue_id||m.white_id;
    // Mark as bye
    await supaFetch(`matches?id=eq.${m.id}`,'PATCH',{
      status:'bye', winner_id:byeWinner, win_reason:'bye'
    });
    // Propagate further only if the next match also becomes a bye
    if(m.w_to_match&&byeWinner){
      const field=m.w_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.w_to_match}`,'PATCH',{[field]:byeWinner});
      // recursive call disabled
    }
  }catch(e){console.error('autoProcessBye:',e);}
}
