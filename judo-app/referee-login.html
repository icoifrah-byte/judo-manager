<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>כניסת שופט</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0a0a0e;color:#f0f0f0;font-family:'Heebo',sans-serif;display:flex;align-items:center;justify-content:center;}

.card{
  background:#111318;border:1px solid #1e2130;border-radius:14px;
  padding:32px 28px;width:100%;max-width:360px;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#e8c84a;text-align:center;margin-bottom:4px;}
.sub{font-size:12px;color:#3a3f50;text-align:center;margin-bottom:28px;letter-spacing:.5px;}

.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.fg label{font-size:11px;font-weight:700;color:#8a8fa0;text-transform:uppercase;letter-spacing:.5px;}
.fc{background:#0a0b0f;border:1px solid #1e2130;border-radius:7px;padding:11px 14px;color:#f0f0f0;font-family:'Heebo',sans-serif;font-size:15px;outline:none;width:100%;transition:border-color .15s;}
.fc:focus{border-color:#e8c84a;}

/* PIN input — big digits */
#pin-input{
  font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:8px;
  text-align:center;background:#0a0b0f;border:1px solid #1e2130;
  border-radius:7px;padding:12px 14px;color:#e8c84a;outline:none;width:100%;
  transition:border-color .15s;
}
#pin-input:focus{border-color:#e8c84a;}
#pin-input.error{border-color:#e84a4a;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}};

.tatami-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.tatami-btn{
  padding:12px 8px;border-radius:8px;border:2px solid #1e2130;
  background:transparent;color:#4a4f60;font-family:'Heebo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;
}
.tatami-btn:hover{border-color:#8a8fa0;color:#f0f0f0;}
.tatami-btn.selected{border-color:#e8c84a;background:rgba(232,200,74,.1);color:#e8c84a;}

.submit-btn{
  width:100%;padding:13px;border-radius:8px;border:none;
  background:#e8c84a;color:#000;font-family:'Heebo',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;
}
.submit-btn:hover{background:#f0d460;}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}

.err-msg{color:#e84a4a;font-size:12px;text-align:center;min-height:18px;margin-top:-8px;margin-bottom:8px;}

/* style selector */
.style-row{display:flex;gap:8px;margin-bottom:20px;}
.style-opt{
  flex:1;padding:10px 6px;border-radius:7px;border:2px solid #1e2130;
  background:transparent;color:#4a4f60;font-family:'Heebo',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;
}
.style-opt:hover{border-color:#8a8fa0;color:#f0f0f0;}
.style-opt.selected{border-color:#e8c84a;background:rgba(232,200,74,.1);color:#e8c84a;}
</style>
<script src="db.js"></script>
</head>
<body>
<div class="card">
  <div class="logo">JUDO</div>
  <div class="sub">כניסת שופט</div>

  <!-- PIN -->
  <div class="fg">
    <label>קוד שיפוט</label>
    <input type="number" id="pin-input" placeholder="····" maxlength="8"
      oninput="onPinInput()" onkeydown="if(event.key==='Enter')tryEnter()">
  </div>
  <div class="err-msg" id="err-msg"></div>

  <!-- TATAMI -->
  <div class="fg" style="margin-bottom:12px;">
    <label>בחר מזרן</label>
  </div>
  <div class="tatami-grid" id="tatami-grid"></div>

  <!-- STYLE -->
  <div class="fg" style="margin-bottom:10px;"><label>סגנון תצוגה</label></div>
  <div class="style-row">
    <button class="style-opt selected" id="style-rows" onclick="selectStyle('rows')">☰ שורות</button>
    <button class="style-opt" id="style-sides" onclick="selectStyle('sides')">◧ צדדים</button>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="tryEnter()" disabled>כניסה →</button>
</div>

<script>
// ═══════════════════════════════
// CONFIG — in production comes from Supabase / URL
// ═══════════════════════════════
// Read from localStorage (set by index.html admin)
function getConfig(){
  try{
    const stored = localStorage.getItem('judo_config');
    if(stored) return JSON.parse(stored);
  }catch(e){}
  // defaults
  return { ref_code:'1234', tatami_count:3 };
}

const CFG = getConfig();
let selectedTatami = null;
let selectedStyle = 'rows';

// ═══════════════════════════════
// BUILD TATAMI BUTTONS
// ═══════════════════════════════
async function ensureActiveComp(){
  // If no active comp, load the most recent one
  if(!localStorage.getItem('judo_active_comp')){
    try{
      const comps=await DB.getCompetitions();
      if(comps&&comps.length){
        localStorage.setItem('judo_active_comp', comps[0].id);
        localStorage.setItem('judo_config', JSON.stringify({
          ref_code: comps[0].ref_code||'1234',
          tatami_count: comps[0].tatami_count||3,
          match_duration: comps[0].match_duration||180,
        }));
        // Reload config
        Object.assign(CFG, {
          ref_code: comps[0].ref_code||'1234',
          tatami_count: comps[0].tatami_count||3,
        });
        ensureActiveComp().then(()=>buildTatamiGrid());
      }
    }catch(e){console.error('ensureActiveComp:',e);}
  }
}

function buildTatamiGrid(){
  const grid = document.getElementById('tatami-grid');
  const n = CFG.tatami_count || 3;
  grid.innerHTML = '';
  for(let i=1;i<=n;i++){
    const btn = document.createElement('button');
    btn.className = 'tatami-btn';
    btn.textContent = 'מזרן ' + i;
    btn.onclick = () => selectTatami(i, btn);
    grid.appendChild(btn);
  }
}

function selectTatami(n, el){
  selectedTatami = n;
  document.querySelectorAll('.tatami-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  checkReady();
}

function selectStyle(s){
  selectedStyle = s;
  document.getElementById('style-rows').classList.toggle('selected', s==='rows');
  document.getElementById('style-sides').classList.toggle('selected', s==='sides');
}

function onPinInput(){
  document.getElementById('pin-input').classList.remove('error');
  document.getElementById('err-msg').textContent = '';
  checkReady();
}

function checkReady(){
  const pin = document.getElementById('pin-input').value;
  const ready = pin.length > 0 && selectedTatami !== null;
  document.getElementById('submit-btn').disabled = !ready;
}

async function tryEnter(){
  const pin = String(document.getElementById('pin-input').value).trim();
  const correct = String(CFG.ref_code || '1234');

  if(pin !== correct){
    document.getElementById('pin-input').classList.add('error');
    document.getElementById('err-msg').textContent = 'קוד שגוי — נסה שוב';
    document.getElementById('pin-input').value = '';
    setTimeout(()=>document.getElementById('pin-input').classList.remove('error'),600);
    return;
  }
  if(!selectedTatami){
    document.getElementById('err-msg').textContent = 'יש לבחור מזרן';
    return;
  }

  const target = selectedStyle === 'sides' ? 'referee-sides.html' : 'referee-rows.html';
  const params = new URLSearchParams({
    tatami: selectedTatami,
    banner: 'מזרן ' + selectedTatami,
  });

  try{
    const compId = localStorage.getItem('judo_active_comp');
    if(compId){
      // Find matches via category tatami assignment (reliable)
      const cats = await DB.getCategories(compId);
      const tatamiCats = (cats||[]).filter(c=>Number(c.tatami_id)===Number(selectedTatami));
      
      let nextMatch = null;
      let nextCat = null;
      
      for(const cat of tatamiCats){
        // cat.matches already loaded via getCategories join
        const matches = cat.matches || [];
        const pending = matches
          .filter(m=>m.status==='pending' && m.blue_id && m.white_id && m.win_reason!=='bye')
          .sort((a,b)=>(a.order_in_tatami||99)-(b.order_in_tatami||99));
        if(pending.length){
          nextMatch = pending[0];
          nextCat = cat;
          break;
        }
      }
      
      if(nextMatch && nextCat){
        const comps = nextCat.competitors||[];
        const blue = comps.find(c=>c.id===nextMatch.blue_id);
        const white = comps.find(c=>c.id===nextMatch.white_id);
        
        if(blue?.name)  params.set('blue',  blue.name);
        if(white?.name) params.set('white', white.name);
        if(blue?.club)  params.set('bclub', blue.club);
        if(white?.club) params.set('wclub', white.club);
        params.set('stage',  nextCat.name + (nextMatch.stage ? ' · '+nextMatch.stage : ''));
        params.set('banner', 'מזרן '+selectedTatami+' · '+nextCat.name);
        params.set('matchid', nextMatch.id);
        params.set('blueid',  nextMatch.blue_id);
        params.set('whiteid', nextMatch.white_id);
        
        // Reset any live matches on this tatami
        const _k='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzZWpxd3FvcmV1Zm90cWV1emRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjkzOTcsImV4cCI6MjA5MTQwNTM5N30.HEUNqkCxdOIZDg04P4OZnOuw2QswajJPB4MDTpTjbwQ';
        for(const cat of tatamiCats){
          await fetch(`https://gsejqwqoreufotqeuzdf.supabase.co/rest/v1/matches?category_id=eq.${cat.id}&status=eq.live`,{
            method:'PATCH',
            headers:{'apikey':_k,'Authorization':`Bearer ${_k}`,'Content-Type':'application/json'},
            body:JSON.stringify({status:'pending'})
          }).catch(()=>{});
        }
        // Mark this match as live
        await DB.updateMatch(nextMatch.id, {status:'live'});
        
        const config = JSON.parse(localStorage.getItem('judo_config')||'{}');
        if(config.match_duration) params.set('dur', config.match_duration);
      }
    }
  }catch(e){ console.error('load match:',e); }

  location.href = target + '?' + params.toString();
}

// Allow Enter key
document.addEventListener('keydown', e=>{
  if(e.key==='Enter') tryEnter();
});

buildTatamiGrid();
</script>
</body>
</html>
