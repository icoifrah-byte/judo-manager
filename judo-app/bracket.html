<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>שופט — צדדים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:#0d0e14;color:#f0f0f0;font-family:'Heebo',sans-serif;touch-action:manipulation;}

/* ════════════════════════════════
   LAYOUT: banner / halves / timer
   ════════════════════════════════ */
#app{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
:fullscreen #app{height:100vh;width:100vw;}
:fullscreen #banner{position:relative;z-index:10;}
:-webkit-full-screen #app{height:100vh;width:100vw;}
body.fullscreen #app{height:100vh;width:100vw;}

/* BANNER */
#banner{
  flex-shrink:0;
  background:#111318;border-bottom:2px solid #1e2130;
  display:flex;align-items:center;justify-content:center;
  padding:6px 16px;min-height:52px;
}
#banner-text{font-size:14px;font-weight:600;color:#8a8fa0;letter-spacing:.3px;text-align:center;}

/* HALVES ROW */
#halves{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;}

.half{display:flex;flex-direction:column;overflow:hidden;}
.half.blue{background:#0033aa;}
.half.white{background:#f0f0f0;border-left:2px solid #cccccc;}
.white .sc-lbl{color:#aaaaaa;}
.white .info-strip{border-bottom:1px solid #dddddd;}

/* player info strip */
.info-strip{
  flex-shrink:0;padding:8px 14px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.player-name{font-size:15px;font-weight:700;line-height:1.2;}
.blue .player-name{color:#ffffff;}
.white .player-name{color:#111118;}
.player-meta{font-size:10px;color:#888898;margin-top:1px;}

/* IWY scoring area — fills remaining space */
.score-area{
  flex:1;display:flex;align-items:stretch;min-height:0;
}
.score-col{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;padding:4px 2px;
  position:relative;
}
.score-col:not(:last-child){border-right:1px solid rgba(0,0,0,.1);}
.blue .score-col:not(:last-child){border-right:1px solid rgba(255,255,255,.12);}
.score-col:active{opacity:.65;}
.sc-lbl{font-size:11px;font-weight:700;letter-spacing:1px;color:#4a4f60;margin-bottom:4px;}
.blue .sc-lbl{color:rgba(255,255,255,.4);}
.sc-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,12vw,96px);
  line-height:1;
}
.sc-num{color:#3a3e50;}
.white .sc-num{color:#cccccc;}
.blue .sc-num{color:rgba(255,255,255,.2);}
.sc-num.I.has-score{color:#ff3030;}
.sc-num.W.has-score{color:#ff3030;}
.sc-num.Y.has-score{color:#ff3030;}

/* shido row */
.shido-row{
  flex-shrink:0;display:flex;justify-content:center;gap:10px;
  padding:6px 12px 10px;
}
.shido-sq{width:24px;height:24px;border-radius:4px;border:2px solid #cccccc;background:transparent;cursor:pointer;transition:all .15s;}
.shido-sq.on{background:#ff3030;border-color:#ff3030;}
.blue .shido-sq{border-color:#2a2d3a;}

/* ════════════════════════════════
   TIMER BAR
   ════════════════════════════════ */
#timer-bar{
  flex-shrink:0;height:150px;
  background:#111318;border-top:2px solid #1e2130;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;
}

/* main clock — click to start/pause */
#main-clock{
  font-family:'Bebas Neue',sans-serif;font-size:74px;
  letter-spacing:4px;color:#ff3030;line-height:1;
  cursor:pointer;user-select:none;transition:color .3s,opacity .1s;
}
#main-clock.running{color:#00cc44;}
#main-clock.golden{color:#e8c84a;animation:gpulse 1s infinite;}
#main-clock:active{opacity:.7;}
#main-clock.golden{color:#e8c84a;animation:gpulse 1s infinite;}
#clock-sub{font-size:9px;color:#2a2d3a;letter-spacing:1.5px;margin-top:-4px;}
@keyframes gpulse{0%,100%{opacity:1;}50%{opacity:.5;}}

/* osaekomi row */
#osae-row{display:flex;align-items:center;gap:12px;}

/* blue assign square */
.assign-sq{
  width:24px;height:24px;border-radius:4px;
  cursor:pointer;transition:all .15s;border:2px solid;
}
.assign-sq.sq-blue{background:#0d1f3d;border-color:#2a6fd8;}
.assign-sq.sq-blue.sel{background:#2a6fd8;border-color:#7ab0ff;box-shadow:0 0 8px rgba(42,111,216,.5);}
.assign-sq.sq-white{background:#d0d0d0;border-color:#e0e0e0;}
.assign-sq.sq-white.sel{background:#ffffff;border-color:#ffffff;box-shadow:0 0 8px rgba(255,255,255,.5);}

/* osaekomi clock — click to start/stop */
#osae-block{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
#osae-clock{
  font-family:'Bebas Neue',sans-serif;font-size:36px;
  letter-spacing:2px;line-height:1;color:#3a3f50;
  user-select:none;transition:opacity .1s,color .2s;
}
#osae-clock:active{opacity:.7;}
#osae-clock.active{color:#e8c84a;animation:gpulse .8s infinite;}
#osae-clock.pending-blink{color:#ff8800;animation:gpulse .5s infinite;}
#osae-lbl{font-size:8px;color:#2a2d3a;letter-spacing:1.5px;margin-top:0px;}

/* ════════════════════════════════
   WINNER BANNER
   ════════════════════════════════ */
#winner-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#winner-overlay.show{display:flex;}
#win-label{font-size:13px;letter-spacing:3px;color:#8a8fa0;}
#win-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,10vw,80px);letter-spacing:3px;}
#win-name.bc{color:#4a90ff;}#win-name.wc{color:#d0d0d0;}
#win-reason{font-size:14px;color:#3a3f50;letter-spacing:1px;}
.ov-btn{padding:10px 28px;border-radius:8px;border:1px solid #2a2d3a;background:#1a1c28;color:#f0f0f0;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.ov-btn:hover{border-color:#8a8fa0;}

/* ════════════════════════════════
   MIRROR MODE — swap column order only
   grid-template-columns reversed = blue↔white swap
   No text flipping needed
   ════════════════════════════════ */
#halves.mirrored{direction:rtl;}
#halves.mirrored .half{direction:ltr;}

/* fullscreen mode — hide ctrl-bar */
/* hide ctrl-bar in fullscreen — works in all browsers */
:fullscreen #ctrl-bar{display:none!important;visibility:hidden;}
:-webkit-full-screen #ctrl-bar{display:none!important;visibility:hidden;}
:-moz-full-screen #ctrl-bar{display:none!important;}
body.fullscreen #ctrl-bar{display:none!important;visibility:hidden;}
/* offline badge handled inline */

/* show fullscreen offline badge */
:fullscreen #offline-fullscreen-badge{display:flex!important;}
:-webkit-full-screen #offline-fullscreen-badge{display:flex!important;}
body.fullscreen #offline-fullscreen-badge{display:flex!important;}
body.fullscreen #app{background:#0a0a0e;}

/* offline badge */
/* offline-badge is now inline in ctrl-bar, not fixed */

/* modal shared */
.side-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.side-ov.h{display:none;}
.side-md{background:#111318;border:1px solid #1e2130;border-radius:10px;width:100%;max-width:380px;}
.side-mh{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.side-mt{font-size:14px;font-weight:700;color:#f0f0f0;}
.side-mb{padding:0 16px 16px;}
.side-mf{padding:10px 16px;border-top:1px solid #1e2130;display:flex;justify-content:flex-end;gap:8px;}
.side-fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.side-fg label{font-size:10px;font-weight:700;color:#8a8fa0;text-transform:uppercase;letter-spacing:.4px;}
.side-fc{background:#0a0b0f;border:1px solid #1e2130;border-radius:5px;padding:8px 10px;color:#f0f0f0;font-family:'Heebo',sans-serif;font-size:13px;outline:none;width:100%;}
.side-fc:focus{border-color:#e8c84a;}
.side-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.side-btn-p{background:#e8c84a;color:#000;}
.side-btn-s{background:#191c24;color:#f0f0f0;border:1px solid #1e2130;}

/* topbar for controls */
/* topbar for controls */
#ctrl-bar{
  flex-shrink:0;
  background:rgba(10,10,14,.98);
  border-bottom:1px solid #1e2130;
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;flex-wrap:wrap;
  z-index:50;
}
.ctrl-btn{
  padding:3px 9px;border-radius:4px;border:1px solid #1e2130;
  background:rgba(10,10,14,.9);color:#4a4f60;
  font-family:'Heebo',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;
}
.ctrl-btn:hover{color:#f0f0f0;border-color:#4a4f60;}
.ctrl-btn.on{background:rgba(155,89,182,.2);color:#9b59b6;border-color:#9b59b6;}
</style>
<script src="db.js"></script>
</head>

<script>
// ═══════════════════════════
// STATE
// ═══════════════════════════
const SC = {
  blue:  {I:0,W:0,Y:0,S:0},
  white: {I:0,W:0,Y:0,S:0},
};
const SHIDO = {blue:[false,false,false], white:[false,false,false]};
const hist = [];  // {type,side,key,prev}

let status = 'idle'; // idle|live|paused|golden|done
let timeLeft = 180;
let osaeTime = 0;
let osaeActive = false;
let osaeSide = null;
let mainInterval = null;
let osaeInterval = null;
let matchDuration = 180;
let mirrored = false; // default OFF — computer shows normally, TV uses ?mirror=1

// ═══════════════════════════
// MIRROR
// ═══════════════════════════
function toggleMirror(){
  mirrored = !mirrored;
  document.getElementById('halves').classList.toggle('mirrored', mirrored);
  document.getElementById('mirror-btn').classList.toggle('on', mirrored);
  document.getElementById('mirror-btn').textContent = mirrored ? '⇄ מראה' : '⇄ רגיל';
}
// init from URL or default (false = normal on computer)
document.getElementById('halves').classList.toggle('mirrored', mirrored);

// ═══════════════════════════
// TIMER
// ═══════════════════════════
function toggleTimer(){
  if(status==='done') return;
  if(status==='idle'||status==='paused'){
    status = status==='golden'?'golden':'live';
    if(timeLeft===0&&status!=='golden'){status='golden';}
    else status='live';
    startMain();
  } else {
    pauseMain(); status='paused';
  }
  syncClockSub();
}

function startMain(){
  if(mainInterval) clearInterval(mainInterval);
  mainInterval = setInterval(()=>{
    if(status==='golden') timeLeft++;
    else {
      timeLeft--;
      if(timeLeft<=0){
        timeLeft=0; clearInterval(mainInterval); mainInterval=null;
        syncMainClock();
        stopOsaeInterval();
        checkTimeEnd(); return;
      }
    }
    syncMainClock();
  },1000);
}

function pauseMain(){
  if(mainInterval){clearInterval(mainInterval);mainInterval=null;}
  stopOsaeInterval();
}

function checkTimeEnd(){
  const b=SC.blue,w=SC.white;
  let win=null;
  if(b.W!==w.W)win=b.W>w.W?'blue':'white';
  else if(b.Y!==w.Y)win=b.Y>w.Y?'blue':'white';
  if(win){declareWinner(win,'Time');return;}
  // Tie: stop at 0:00, wait for referee to tap clock for golden score
  status='paused';
  timeLeft=0;
  syncMainClock();
  document.getElementById('clock-sub')||document.getElementById('r-status-lbl');
  // Show GS prompt on sub label
  ['clock-sub','r-status-lbl','s-status-lbl'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent='⚡ לחץ להתחלת גולדן סקור';
  });
  showToast('⏱ לחץ על השעון להתחיל גולדן סקור');
}

function syncMainClock(){
  const el=document.getElementById('main-clock');
  const gs=status==='golden';
  const running=status==='live';
  const mm=Math.floor(timeLeft/60), ss=String(timeLeft%60).padStart(2,'0');
  el.textContent=gs?`GS ${mm}:${ss}`:`${mm}:${ss}`;
  el.classList.toggle('golden',gs);
  el.classList.toggle('running',running&&!gs);
}

function syncClockSub(){
  const map={idle:'לחץ להתחלה',live:'',paused:'מושהה',golden:'⚡ גולדן סקור',done:'הסתיים'};
  document.getElementById('clock-sub').textContent=map[status]||'';
}

// ═══════════════════════════
// OSAEKOMI
// ═══════════════════════════
function toggleOsae(){
  if(status!=='live'&&status!=='golden') return;
  osaeActive ? stopOsae() : startOsae();
}

function startOsae(){
  osaeActive=true;
  pauseMain();
  if(osaeInterval) clearInterval(osaeInterval);
  osaeInterval=setInterval(()=>{
    osaeTime++;
    // auto-ippon at 20s, or earlier if side already has waza-ari
    if(osaeSide && getOsaeKey(osaeTime, osaeSide)==='I' && osaeTime>=10){
      stopOsaeInterval();
      osaeActive=false;
      add(osaeSide,'I');
      osaeTime=0;
      syncOsaeClock();
      if(status==='live'||status==='golden') startMain();
      return;
    }
    syncOsaeClock();
  },1000);
  syncOsaeClock();
}

function stopOsaeInterval(){
  if(osaeInterval){clearInterval(osaeInterval);osaeInterval=null;}
}

function getOsaeKey(secs, side){
  // If side already has waza-ari, 10s → ippon directly
  if(secs>=10 && SC[side].W>=1) return 'I';
  if(secs>=20) return 'I';
  if(secs>=10) return 'W';
  if(secs>=5)  return 'Y';
  return null;
}

let pendingOsaeTime=0;  // frozen time waiting for assignment
let pendingOsaeTimeout=null;  // 10s auto-cancel

function stopOsae(){
  stopOsaeInterval();
  osaeActive=false;

  if(osaeTime>=5){
    if(osaeSide){
      // side already assigned — award immediately
      const key=getOsaeKey(osaeTime, osaeSide);
      if(key) add(osaeSide, key);
      osaeTime=0;
      syncOsaeClock();
      if(status==='live'||status==='golden') startMain();
    } else {
      // no side assigned — freeze clock, blink, wait up to 10s
      pendingOsaeTime=osaeTime;
      osaeTime=0;
      startPendingBlink();
    }
  } else {
    osaeTime=0;
    syncOsaeClock();
    if(status==='live'||status==='golden') startMain();
  }
}

function startPendingBlink(){
  // blink the osae clock showing frozen time
  document.getElementById('osae-clock').classList.add('pending-blink');
  document.getElementById('osae-clock').textContent=String(pendingOsaeTime).padStart(2,'0');
  // auto-cancel after 10s if no assignment
  if(pendingOsaeTimeout) clearTimeout(pendingOsaeTimeout);
  pendingOsaeTimeout=setTimeout(()=>{
    cancelPending();
    if(status==='live'||status==='golden') startMain();
  },10000);
}

function cancelPending(){
  if(pendingOsaeTimeout){clearTimeout(pendingOsaeTimeout);pendingOsaeTimeout=null;}
  document.getElementById('osae-clock').classList.remove('pending-blink');
  pendingOsaeTime=0;
  syncOsaeClock();
}

function assignOsae(side){
  // if pending award waiting for assignment — award now
  if(pendingOsaeTime>0){
    osaeSide=side;
    document.getElementById('sq-blue').classList.toggle('sel',osaeSide==='blue');
    document.getElementById('sq-white').classList.toggle('sel',osaeSide==='white');
    const t=pendingOsaeTime;
    cancelPending();
    const k=getOsaeKey(t,side);
    if(k) add(side,k);
    if(status==='live'||status==='golden') startMain();
    return;
  }
  osaeSide=osaeSide===side?null:side;
  document.getElementById('sq-blue').classList.toggle('sel',osaeSide==='blue');
  document.getElementById('sq-white').classList.toggle('sel',osaeSide==='white');
}

function syncOsaeClock(){
  const el=document.getElementById('osae-clock');
  const ss=String(osaeTime).padStart(2,'0');
  el.textContent=ss;
  el.classList.toggle('active',osaeActive);
}

// Save full score snapshot for undo
function saveHist(side){
  hist.push({
    side,
    snap:{...SC[side]},
    shidoSnap:[...SHIDO[side]],
  });
}

function add(side, key){
  if(status==='done') return;
  saveHist(side);

  if(key==='W'){
    // 2nd waza-ari → ippon (clear waza)
    if(SC[side].W >= 1){
      SC[side].W = 0;
      SC[side].I = 1;
    } else {
      SC[side].W = 1;
    }
  } else if(key==='I'){
    SC[side].I = 1;
  } else if(key==='Y'){
    SC[side].Y = Math.min(9, SC[side].Y + 1);
  }

  syncScore();
  checkWin();
}

function toggleShido(side, idx){
  if(status==='done') return;
  saveHist(side);
  SHIDO[side][idx] = !SHIDO[side][idx];
  SC[side].S = SHIDO[side].filter(Boolean).length;
  syncShido(side);
  checkWin();
}

function undoLast(){
  if(!hist.length) return;
  const e = hist.pop();
  SC[e.side] = {...e.snap};
  SHIDO[e.side] = [...e.shidoSnap];
  syncScore();
  syncShido(e.side);
}

function checkWin(){
  const b=SC.blue, w=SC.white;
  if(b.I>=1){ declareWinner('blue','Ippon'); return; }
  if(w.I>=1){ declareWinner('white','Ippon'); return; }
  // Waza-ari×2 check (shouldn't reach here normally, handled in add())
  if(b.W>=2){ SC.blue.W=0; SC.blue.I=1; syncScore(); declareWinner('blue','Waza-ari × 2'); return; }
  if(w.W>=2){ SC.white.W=0; SC.white.I=1; syncScore(); declareWinner('white','Waza-ari × 2'); return; }
  if(b.S>=3){ declareWinner('white','Hansoku-make'); return; }
  if(w.S>=3){ declareWinner('blue','Hansoku-make'); return; }
}

const _SUPA='https://gsejqwqoreufotqeuzdf.supabase.co';
const _KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzZWpxd3FvcmV1Zm90cWV1emRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjkzOTcsImV4cCI6MjA5MTQwNTM5N30.HEUNqkCxdOIZDg04P4OZnOuw2QswajJPB4MDTpTjbwQ';
const _H={'apikey':_KEY,'Authorization':`Bearer ${_KEY}`,'Content-Type':'application/json'};

async function supaFetch(path, method='GET', body=null){
  const res=await fetch(`${_SUPA}/rest/v1/${path}`,{
    method, headers:_H, body:body?JSON.stringify(body):undefined
  });
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

// After match done — propagate winner/loser to next matches
// Also auto-processes BYE if next match has only one player
async function propagateWinner(matchId, winnerId, loserId){
  if(!matchId) return;
  try{
    const rows=await supaFetch(`matches?id=eq.${matchId}&select=w_to_match,w_to_side,l_to_match,l_to_side,category_id`);
    const m=rows?.[0];
    if(!m) return;
    const catId=m.category_id;

    // Propagate winner to next match
    if(m.w_to_match&&winnerId){
      const field=m.w_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.w_to_match}`,'PATCH',{[field]:winnerId});
      // Check if next match is now a BYE (has one player, other is null)
      await autoProcessBye(catId, m.w_to_match);
    }
    // Propagate loser to consolation
    if(m.l_to_match&&loserId){
      const lField=m.l_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.l_to_match}`,'PATCH',{[lField]:loserId});
      await new Promise(r=>setTimeout(r,400));
      await checkAndProcessBye(catId, m.l_to_match);
    }
  }catch(e){console.error('propagate:',e);}
}

// Check if a consolation match has only one player and auto-process as BYE
async function checkAndProcessBye(catId, matchNum){
  try{
    const rows=await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${matchNum}&select=id,blue_id,white_id,status,stage_type,w_to_match,w_to_side,l_to_match,l_to_side,win_reason`);
    const m=rows?.[0];
    if(!m) return;
    // Only process: not yet done, consolation match (R), exactly ONE player
    if(m.status==='done'||m.status==='bye') return;
    if(m.blue_id&&m.white_id) return; // both players = real match
    if(!m.blue_id&&!m.white_id) return; // no players yet = wait
    if(m.stage_type!=='R') return; // only consolation matches
    
    const winner=m.blue_id||m.white_id;
    // Mark as bye
    await supaFetch(`matches?id=eq.${m.id}`,'PATCH',{
      status:'bye', winner_id:winner, win_reason:'bye'
    });
    // Place winner in next match (no recursion - wait for real opponent)
    if(m.w_to_match&&winner){
      const field=m.w_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.w_to_match}`,'PATCH',{[field]:winner});
    }
  }catch(e){console.warn('checkAndProcessBye:',e);}
}

// Auto-process a match as BYE ONLY if it has exactly one player AND the other slot is NULL
// This means the match was originally a bye (odd-number bracket), not a future match
async function autoProcessBye(catId, matchNum){
  try{
    const rows=await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${matchNum}&select=id,blue_id,white_id,status,stage_type,w_to_match,w_to_side,win_reason`);
    const m=rows?.[0];
    if(!m) return;
    if(m.status==='done'||m.status==='bye'||m.win_reason==='bye') return;
    // Both players present = normal match, never auto-bye
    if(m.blue_id&&m.white_id) return;
    // No players at all = future match not yet filled, skip
    if(!m.blue_id&&!m.white_id) return;
    // Exactly one player AND this is a consolation/rep match (stage_type=R)
    // Only auto-bye consolation matches, never winners bracket
    if(m.stage_type!=='R') return;
    const byeWinner=m.blue_id||m.white_id;
    // Mark as bye
    await supaFetch(`matches?id=eq.${m.id}`,'PATCH',{
      status:'bye', winner_id:byeWinner, win_reason:'bye'
    });
    // Propagate further only if the next match also becomes a bye
    if(m.w_to_match&&byeWinner){
      const field=m.w_to_side==='blue'?'blue_id':'white_id';
      await supaFetch(`matches?category_id=eq.${catId}&match_num=eq.${m.w_to_match}`,'PATCH',{[field]:byeWinner});
      // recursive call disabled
    }
  }catch(e){console.error('autoProcessBye:',e);}
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111318;border:1px solid #1e2130;border-radius:7px;padding:8px 16px;font-size:12px;color:#4ae89a;z-index:999;pointer-events:none;white-space:nowrap;';
  t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}
